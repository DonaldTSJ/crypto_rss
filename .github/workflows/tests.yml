name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile
        run: python -m compileall -q rwa_intel_mvp
      - name: Unit tests
        run: python -m unittest tests/test_rwa_intel_mvp.py
